syntax = "proto3";

package swh.blockchain.v1;
option go_package = "swhServer/proto;swh_pb";

// 사용자 지갑 및 서명 정보
message Identity {
  string public_key = 1;     // 사용자의 공개키 (Ed25519)
  bytes signature = 2;       // Payload 전체에 대한 전자 서명값
  int64 timestamp = 3;       // 타임스탬프
}

// 서비스 제공자가 검증을 요청하는 조건
message ProviderCondition {
  string provider_id = 1;
  string condition_query = 2; 
}

// --- 원장 데이터 체계 정의 ---

message PublicData {
  string name = 1;
  string birthdate = 2;
  string gender = 3;
  string nationality = 4;
  map<string, string> custom_fields = 5; // 확장 가능성
}

message PrivateData {
  int64 money_nyang = 1; // 1냥 = 1000원
  int64 money_jeon = 2;  // 1전 = 100원
  map<string, string> assets = 3; // { "house": "A-building", "car": "Tesla" }
  map<string, string> custom_fields = 4; // [신규] Private 영역 확장용 필드
}

message TmpData {
  bytes placeholder = 1; // 확장용 임시 섹션
}

message LedgerEnvelope {
  PublicData public = 1;
  PrivateData private = 2;
  TmpData tmp = 3;
}

// --- 앵커링 및 검증 관련 ---

// 퍼블릭 체인에 기록될 앵커 데이터
message AnchorRecord {
  string key = 1;            // 블록 식별 키
  string ledger_hash = 2;    // 원장 전체의 SHA-256 해시값
  int64 timestamp = 3;       // 앵커링 시점
}

message VerifyLedgerRequest {
  Identity user_identity = 1;
  bytes encrypted_ledger_snapshot = 2; 
  ProviderCondition condition = 3;
}

message VerifyLedgerResponse {
  bool is_valid = 1;
  string transaction_id = 2;
  string error_message = 3;
}

message SubmitTransactionRequest {
  Identity sender_identity = 1;
  bytes transaction_payload = 2;  
  AnchorRecord anchor = 3;        // [신규] 퍼블릭 체인에 함께 기록할 앵커 정보
}

message SubmitTransactionResponse {
  bool success = 1;
  string block_hash = 2;
}

// 퍼블릭 체인 조회 요청/응답
message GetAnchorRequest {
  string key = 1;
}

message GetAnchorResponse {
  bool found = 1;
  AnchorRecord anchor = 2;
}

service LedgerService {
  // 제공자의 조건에 맞는지 원장 상태를 검증
  rpc VerifyCondition (VerifyLedgerRequest) returns (VerifyLedgerResponse);
  
  // 상태 변경 및 퍼블릭 앵커 기록
  rpc SubmitTransaction (SubmitTransactionRequest) returns (SubmitTransactionResponse);

  // 퍼블릭 체인에서 특정 키의 앵커 기록 조회
  rpc GetAnchor (GetAnchorRequest) returns (GetAnchorResponse);
}